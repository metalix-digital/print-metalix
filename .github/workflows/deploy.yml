name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, metalix-vm]
    steps:
      - name: Pull, rebuild only what changed, restart
        run: |
          set -e
          REPO=/var/www/metalix

          # A previous manual `npm install` on the box can leave the
          # lockfiles locally modified, which makes `git pull` refuse to
          # overwrite them. `npm ci` never rewrites the lockfile, so this
          # is just a safety net for state left over from before this
          # workflow existed. client/dist is rebuilt by this same script
          # every time client/ changes (see below), so it's *always*
          # locally modified after a deploy — discard that every run too,
          # or the next pull that also touches dist refuses to merge.
          sudo -u www-data git -C "$REPO" checkout -- server/package-lock.json client/package-lock.json client/dist || true

          OLD_HEAD=$(sudo -u www-data git -C "$REPO" rev-parse HEAD)
          sudo -u www-data git -C "$REPO" pull origin main
          NEW_HEAD=$(sudo -u www-data git -C "$REPO" rev-parse HEAD)

          if [ "$OLD_HEAD" = "$NEW_HEAD" ]; then
            echo "Nothing new to deploy."
            exit 0
          fi

          CHANGED=$(sudo -u www-data git -C "$REPO" diff --name-only "$OLD_HEAD" "$NEW_HEAD")
          echo "--- changed files ---"
          echo "$CHANGED"

          # Stop the service *before* touching node_modules. `npm ci` wipes
          # and reinstalls from scratch, which briefly deletes the compiled
          # better-sqlite3 native binding — with the service left running,
          # systemd's Restart=always kept retrying node every couple seconds
          # against that half-rebuilt node_modules, crash-looping for the
          # full ~2 minutes npm ci/node-gyp took (see the 2026-07-22 sitemap
          # incident). Stopping first turns that into one clean restart.
          sudo systemctl stop metalix

          # `npm ci` wipes and reinstalls node_modules from scratch every
          # time — on this small VM that's most of the deploy time. Only
          # pay for it when the relevant lockfile actually changed.
          if echo "$CHANGED" | grep -qE '^server/package(-lock)?\.json$'; then
            echo "--- server deps changed, running npm ci ---"
            sudo -u www-data npm ci --omit=dev --prefix "$REPO/server"
          else
            echo "--- server deps unchanged, skipping npm ci ---"
          fi

          if echo "$CHANGED" | grep -q '^client/'; then
            if echo "$CHANGED" | grep -qE '^client/package(-lock)?\.json$'; then
              echo "--- client deps changed, running npm ci ---"
              sudo -u www-data npm ci --prefix "$REPO/client"
            fi
            echo "--- client source changed, rebuilding ---"
            sudo -u www-data npm run build --prefix "$REPO/client"
          else
            echo "--- client unchanged, skipping build ---"
          fi

          sudo systemctl start metalix
          sudo systemctl status metalix --no-pager
