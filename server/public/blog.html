<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Blog — Metalix Print</title>
<meta name="description" content="Tips, guides, and updates on document printing from Metalix Print.">
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://print.metalix.in/blog"/>
<meta name="theme-color" content="#FF6600">
<link rel="icon" type="image/svg+xml" href="/logo.svg"/>
<link rel="preload" href="/fonts/Sora-800.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/fonts/Inter-400.woff2" as="font" type="font/woff2" crossorigin>
<style>
@font-face{font-family:'Sora';font-style:normal;font-weight:700;font-display:swap;src:url(/fonts/Sora-700.woff2) format('woff2');}
@font-face{font-family:'Sora';font-style:normal;font-weight:800;font-display:swap;src:url(/fonts/Sora-800.woff2) format('woff2');}
@font-face{font-family:'Inter';font-style:normal;font-weight:400;font-display:swap;src:url(/fonts/Inter-400.woff2) format('woff2');}
@font-face{font-family:'Inter';font-style:normal;font-weight:600;font-display:swap;src:url(/fonts/Inter-600.woff2) format('woff2');}
@font-face{font-family:'Inter';font-style:normal;font-weight:700;font-display:swap;src:url(/fonts/Inter-700.woff2) format('woff2');}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
:root{
  --orange:#FF6600; --orange-d:#E05500; --orange-l:#FFF4EB; --orange-l2:#FFF1E6; --orange-text:#C2410C; --orange-border:#FFCCA0;
  --ink:#1C1917; --ink2:#44403C; --ink3:#78716C; --ink-fixed:#1C1917;
  --line:#E7E5E4; --line-soft:#F0EFED; --line-hover:#C7C4C0;
  --white:#FFFFFF; --surface-hover:#F5F4F2; --paper:#FAFAF8; --muted:#A8A29E; --muted-hover:#FF8C40;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px -8px rgba(0,0,0,.14);
  --header-bg:rgba(250,250,248,.92);
  color-scheme:light;
}
[data-theme="dark"]{
  --orange-l:rgba(255,102,0,.16); --orange-l2:rgba(255,102,0,.14); --orange-border:rgba(255,102,0,.42);
  --ink:#F7F6F1; --ink2:#D9D4CC; --ink3:#ABA69C;
  --line:#3A3630; --line-soft:#2E2A25; --line-hover:#55504A;
  --white:#1F1D22; --surface-hover:#2A2730; --paper:#141316;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 24px -8px rgba(0,0,0,.6);
  --header-bg:rgba(20,19,22,.88);
  color-scheme:dark;
}
body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;transition:background-color .25s ease,color .25s ease;}
a{color:inherit;}

header{position:sticky;top:0;z-index:50;background:var(--header-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
.header-inner{max-width:960px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:8px;height:64px;}
.h-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;}
.h-logo img{width:34px;height:34px;border-radius:50%;}
.h-logo span{font-family:'Sora',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.01em;}
nav{display:flex;align-items:center;gap:2px;margin-left:32px;}
nav a{font-size:14px;font-weight:600;color:var(--ink2);text-decoration:none;padding:8px 14px;border-radius:8px;transition:all .15s;}
nav a:hover{color:var(--ink);background:var(--surface-hover);}
nav a.active{color:var(--orange-text);}
.h-space{flex:1;}
.theme-toggle{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--line);background:var(--white);color:var(--ink3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:border-color .15s,transform .15s;}
.theme-toggle:hover{border-color:var(--line-hover);transform:translateY(-1px);}
@media(max-width:600px){ nav{display:none;} .header-inner{padding:0 16px;} }

.wrap{max-width:960px;margin:0 auto;padding:56px 24px 90px;}
.hero{margin-bottom:36px;}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--orange-text);background:var(--orange-l);border:1px solid var(--orange-border);padding:6px 12px;border-radius:999px;display:inline-block;margin-bottom:16px;}
h1{font-family:'Sora',sans-serif;font-size:clamp(30px,5vw,42px);font-weight:800;letter-spacing:-.02em;margin-bottom:10px;}
.hero p{color:var(--ink2);font-size:16px;max-width:520px;}

.controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:32px;align-items:center;}
.search-box{flex:1;min-width:220px;display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);border-radius:11px;padding:11px 14px;background:var(--white);}
.search-box input{border:none;outline:none;background:none;font:inherit;font-size:14px;color:var(--ink);width:100%;}
.cat-chips{display:flex;gap:8px;flex-wrap:wrap;}
.cat-chip{font-size:13px;font-weight:600;color:var(--ink2);background:var(--white);border:1.5px solid var(--line);border-radius:999px;padding:7px 14px;cursor:pointer;white-space:nowrap;}
.cat-chip.active{color:var(--orange-d);background:var(--orange-l);border-color:var(--orange-border);}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;}
@media(max-width:700px){.grid{grid-template-columns:1fr;}}
.post-card{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:16px;background:var(--white);overflow:hidden;text-decoration:none;color:inherit;transition:box-shadow .2s,transform .2s;}
.post-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);}
.post-cover{width:100%;aspect-ratio:16/9;background:var(--surface-hover);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.post-cover img{width:100%;height:100%;object-fit:cover;}
.post-cover .ph{font-size:34px;opacity:.35;}
.post-body{padding:18px 20px 20px;display:flex;flex-direction:column;gap:8px;flex:1;}
.post-cat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--orange-text);}
.post-title{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;line-height:1.35;}
.post-excerpt{font-size:13.5px;color:var(--ink2);line-height:1.6;flex:1;}
.post-meta{font-size:12px;color:var(--ink3);margin-top:4px;}
.empty-state{text-align:center;padding:60px 20px;color:var(--ink3);}

footer{background:var(--ink-fixed);color:#fff;padding:40px 24px;margin-top:20px;}
.footer-inner{max-width:960px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;font-size:13.5px;color:#C7C2BA;}
.footer-inner a{color:#fff;text-decoration:none;font-weight:600;}
.footer-inner a:hover{text-decoration:underline;}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
<script>
(function(){
  try{
    var saved = localStorage.getItem('metalix_theme');
    var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  }catch(e){}
})();
</script>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="h-logo" href="/">
      <img src="/logo.svg" alt="Metalix Print">
      <span>Metalix Print</span>
    </a>
    <nav>
      <a href="/">Home</a>
      <a href="/blog" class="active">Blog</a>
      <a href="/order">Place an order</a>
    </nav>
    <div class="h-space"></div>
    <button class="theme-toggle" type="button" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode"><span id="themeToggleIcon">🌙</span></button>
  </div>
</header>

<div class="wrap">
  <div class="hero">
    <span class="eyebrow">📰 METALIX BLOG</span>
    <h1>Printing tips, guides &amp; updates</h1>
    <p>Practical advice on documents, printing, and getting things done — from the team at Metalix Print.</p>
  </div>

  <div class="controls">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="Search posts…" />
    </div>
    <div class="cat-chips" id="catChips"></div>
  </div>

  <div id="postsGrid" class="grid"><div class="empty-state">Loading…</div></div>
</div>

<footer>
  <div class="footer-inner">
    <span>© 2026 Metalix Print</span>
    <span><a href="/">Home</a> · <a href="/order">Place an order</a> · <a href="/policies">Policies</a></span>
  </div>
</footer>

<script>
const themeToggle = document.getElementById('themeToggle');
const themeToggleIcon = document.getElementById('themeToggleIcon');
function syncThemeIcon(){ themeToggleIcon.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙'; }
syncThemeIcon();
themeToggle.addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('metalix_theme', next);
  syncThemeIcon();
});

function escHtml(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
function formatDate(ms){ return ms ? new Date(ms).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : ''; }
function readingTime(excerpt){
  const words = (excerpt || '').split(/\s+/).filter(Boolean).length;
  return Math.max(1, Math.round(words / 40)) + ' min read';
}

let allPosts = [];
let activeCategory = '';
let searchTerm = '';

function renderGrid(){
  const grid = document.getElementById('postsGrid');
  let posts = allPosts;
  if (activeCategory) posts = posts.filter((p) => p.category === activeCategory);
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    posts = posts.filter((p) => p.title.toLowerCase().includes(q) || (p.excerpt || '').toLowerCase().includes(q));
  }
  if (!posts.length) {
    grid.innerHTML = '<div class="empty-state">No posts found.</div>';
    return;
  }
  grid.innerHTML = posts.map((p) => (
    '<a class="post-card" href="/blog/' + encodeURIComponent(p.slug) + '">' +
      '<div class="post-cover">' + (p.coverImage ? ('<img src="' + escHtml(p.coverImage) + '" alt="" loading="lazy">') : '<span class="ph">📄</span>') + '</div>' +
      '<div class="post-body">' +
        (p.category ? '<span class="post-cat">' + escHtml(p.category) + '</span>' : '') +
        '<span class="post-title">' + escHtml(p.title) + '</span>' +
        '<span class="post-excerpt">' + escHtml(p.excerpt || '') + '</span>' +
        '<span class="post-meta">' + escHtml(p.author || 'Metalix Team') + ' · ' + formatDate(p.publishedAt) + ' · ' + readingTime(p.excerpt) + '</span>' +
      '</div>' +
    '</a>'
  )).join('');
}

document.getElementById('searchInput').addEventListener('input', (e) => { searchTerm = e.target.value.trim(); renderGrid(); });

fetch('/api/blog').then((r) => r.json()).then((data) => {
  allPosts = data.posts || [];
  const categories = [...new Set(allPosts.map((p) => p.category).filter(Boolean))];
  const chips = document.getElementById('catChips');
  if (categories.length) {
    chips.innerHTML = '<button class="cat-chip active" data-cat="">All</button>' +
      categories.map((c) => '<button class="cat-chip" data-cat="' + escHtml(c) + '">' + escHtml(c) + '</button>').join('');
    chips.querySelectorAll('.cat-chip').forEach((btn) => {
      btn.addEventListener('click', () => {
        chips.querySelectorAll('.cat-chip').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = btn.dataset.cat;
        renderGrid();
      });
    });
  }
  renderGrid();
}).catch(() => {
  document.getElementById('postsGrid').innerHTML = '<div class="empty-state">Could not load posts — please try again shortly.</div>';
});
</script>

</body>
</html>
